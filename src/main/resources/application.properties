spring.application.name=Criteria-Eligibility-Checker-Service

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/taskOn
spring.datasource.username=omaradel
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=500ms

# Cache logging — shows every cache GET (hit/miss), PUT, and EVICT
logging.level.org.springframework.cache=TRACE
